<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0B0F"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#FFD76A" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFD76A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE99D"/>
      <stop offset="1" stop-color="#9C7431"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A1A1F"/>
      <stop offset="1" stop-color="#0D0D10"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 L0 0 0 32" stroke="#D6A84F" stroke-opacity="0.08" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="480" fill="url(#bg)"/>
  <rect width="800" height="480" fill="url(#grid)"/>
  <rect width="800" height="480" fill="url(#glow)"/>

  <!-- Nummernring groß -->
  <g transform="translate(560 240)">
    <circle r="140" stroke="url(#stroke)" stroke-width="1" stroke-opacity="0.25" fill="none"/>
    <circle r="105" stroke="url(#stroke)" stroke-width="1" stroke-opacity="0.35" fill="none"/>
    <circle r="70" stroke="url(#stroke)" stroke-width="1" stroke-opacity="0.5" fill="none"/>
    <text font-family="Space Grotesk, sans-serif" font-weight="700" font-size="96" fill="#FFE99D" text-anchor="middle" dominant-baseline="central" letter-spacing="-4">01</text>
  </g>

  <!-- Cards floating -->
  <g transform="translate(60 120)">
    <rect x="0" y="0" width="220" height="130" rx="16" fill="url(#card)" stroke="#D6A84F" stroke-opacity="0.25"/>
    <circle cx="24" cy="24" r="6" fill="#FFD76A"/>
    <rect x="24" y="54" width="140" height="8" rx="4" fill="#FFE99D" fill-opacity="0.6"/>
    <rect x="24" y="72" width="100" height="6" rx="3" fill="#D6A84F" fill-opacity="0.4"/>
    <rect x="24" y="90" width="160" height="6" rx="3" fill="#D6A84F" fill-opacity="0.3"/>
  </g>

  <g transform="translate(100 280)">
    <rect x="0" y="0" width="260" height="110" rx="16" fill="url(#card)" stroke="#D6A84F" stroke-opacity="0.2"/>
    <rect x="20" y="20" width="60" height="12" rx="6" fill="#FFD76A" fill-opacity="0.8"/>
    <rect x="20" y="44" width="200" height="6" rx="3" fill="#D6A84F" fill-opacity="0.35"/>
    <rect x="20" y="60" width="160" height="6" rx="3" fill="#D6A84F" fill-opacity="0.25"/>
    <rect x="20" y="80" width="60" height="14" rx="7" fill="none" stroke="#FFD76A" stroke-opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="60" y="70" font-family="Space Grotesk, sans-serif" font-weight="600" font-size="14" fill="#FFD76A" letter-spacing="3">AI GOLDMINING · START</text>
  <text x="60" y="440" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="32" fill="#F5F2E9" letter-spacing="-1">Dein erstes digitales Produkt</text>
</svg>
