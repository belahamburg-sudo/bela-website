<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12120D"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="glow2" cx="0.8" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#FFD76A" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#FFD76A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldstroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE99D"/>
      <stop offset="1" stop-color="#D6A84F"/>
    </linearGradient>
    <linearGradient id="stackfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A1A1F"/>
      <stop offset="1" stop-color="#0A0A0D"/>
    </linearGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" stroke="#D6A84F" stroke-opacity="0.06" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="480" fill="url(#bg2)"/>
  <rect width="800" height="480" fill="url(#grid2)"/>
  <rect width="800" height="480" fill="url(#glow2)"/>

  <!-- Isometric stack of 4 cards -->
  <g transform="translate(140 120)">
    <!-- Card 4 back -->
    <g transform="translate(150 0)">
      <rect x="0" y="0" width="320" height="80" rx="14" fill="url(#stackfill)" stroke="#D6A84F" stroke-opacity="0.2"/>
      <rect x="20" y="28" width="120" height="8" rx="4" fill="#D6A84F" fill-opacity="0.5"/>
      <rect x="20" y="48" width="80" height="6" rx="3" fill="#D6A84F" fill-opacity="0.3"/>
      <rect x="280" y="24" width="24" height="24" rx="6" fill="#FFD76A" fill-opacity="0.8"/>
    </g>
    <!-- Card 3 -->
    <g transform="translate(100 60)">
      <rect x="0" y="0" width="320" height="80" rx="14" fill="url(#stackfill)" stroke="#D6A84F" stroke-opacity="0.28"/>
      <rect x="20" y="28" width="140" height="8" rx="4" fill="#FFE99D" fill-opacity="0.6"/>
      <rect x="20" y="48" width="100" height="6" rx="3" fill="#D6A84F" fill-opacity="0.35"/>
      <rect x="280" y="24" width="24" height="24" rx="6" fill="#FFD76A" fill-opacity="0.9"/>
    </g>
    <!-- Card 2 -->
    <g transform="translate(50 120)">
      <rect x="0" y="0" width="320" height="80" rx="14" fill="url(#stackfill)" stroke="#D6A84F" stroke-opacity="0.35"/>
      <rect x="20" y="28" width="160" height="8" rx="4" fill="#FFE99D" fill-opacity="0.8"/>
      <rect x="20" y="48" width="120" height="6" rx="3" fill="#D6A84F" fill-opacity="0.45"/>
      <rect x="280" y="24" width="24" height="24" rx="6" fill="#FFD76A"/>
    </g>
    <!-- Card 1 front -->
    <g transform="translate(0 180)">
      <rect x="0" y="0" width="320" height="80" rx="14" fill="#1A1A1F" stroke="url(#goldstroke)" stroke-width="1.5"/>
      <rect x="20" y="28" width="160" height="8" rx="4" fill="#FFE99D"/>
      <rect x="20" y="48" width="120" height="6" rx="3" fill="#FFD76A" fill-opacity="0.7"/>
      <rect x="280" y="24" width="24" height="24" rx="6" fill="#FFE99D"/>
    </g>
  </g>

  <!-- Bundle label -->
  <g transform="translate(540 320)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="#FFD76A"/>
    <text x="90" y="26" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="13" fill="#050505" text-anchor="middle" letter-spacing="3">BUNDLE · 4 IN 1</text>
  </g>

  <!-- Tagline -->
  <text x="60" y="70" font-family="Space Grotesk, sans-serif" font-weight="600" font-size="14" fill="#FFD76A" letter-spacing="3">AI GOLDMINING · STARTER PACK</text>
  <text x="60" y="440" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="32" fill="#F5F2E9" letter-spacing="-1">Das komplette System</text>
</svg>
